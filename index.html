<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consuldente News | Radar Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --green: #0d6b36; --gray: #f5f5f3; --white: #ffffff; }
        body { font-family: 'Sora', sans-serif; background: var(--gray); color: #111; overflow-x: hidden; }
        
        header { background: var(--white); padding: 15px 24px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 700; color: var(--green); text-decoration: none; }
        
        .filter-bar { background: var(--white); padding: 10px; display: flex; justify-content: center; gap: 8px; border-bottom: 1px solid #ddd; }
        .chip { padding: 8px 16px; border-radius: 20px; border: 1px solid #ccc; background: white; cursor: pointer; font-size: 12px; font-weight: 600; }
        .chip.active { background: var(--green); color: white; border-color: var(--green); }

        main { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        
        /* Carrossel */
        #radar-container { position: relative; width: 100%; min-height: 450px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; cursor: pointer; }
        .slide-img { width: 100%; height: 300px; object-fit: cover; }
        .slide-content { padding: 25px; }
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 5px; background: var(--green); width: 0%; transition: width 15s linear; }
        
        /* Grid para Categorias */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; display: none; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-body { padding: 15px; }

        .badge { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; background: #e6f7ed; color: var(--green); margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="#" class="logo">🦷 Consuldente <span>News</span></a>
        <div id="clock" style="font-weight: 700; color: var(--green);"></div>
    </div>
</header>

<nav class="filter-bar">
    <button class="chip active" onclick="setView('todas', this)">Radar (Slide)</button>
    <button class="chip" onclick="setView('feira', this)">Feira de Santana</button>
    <button class="chip" onclick="setView('odontologia', this)">Odontologia</button>
</nav>

<main>
    <div id="radar-container" onclick="openLink()">
        <img id="s-img" class="slide-img" src="" alt="">
        <div class="slide-content">
            <span id="s-badge" class="badge"></span>
            <h2 id="s-title" style="font-family:'DM Serif Display'; margin-bottom:10px;"></h2>
            <p id="s-resumo" style="color:#666; font-size:14px;"></p>
            <div style="margin-top:15px; font-size:11px; font-weight:700; color:#999;">
                FONTE: <span id="s-fonte" style="color:var(--green)"></span> | <span id="s-data"></span>
            </div>
        </div>
        <div id="p-bar" class="progress-bar"></div>
    </div>

    <div id="news-grid" class="grid"></div>
</main>

<script>
let newsData = [];
let currentIndex = 0;
let slideInterval;

async function fetchData() {
    const res = await fetch('./data.json?v=' + Date.now());
    newsData = await res.json();
    setView('todas', document.querySelector('.chip'));
    updateClock();
    setInterval(updateClock, 1000);
}

function updateClock() {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
}

function setView(mode, btn) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    
    clearInterval(slideInterval);
    const container = document.getElementById('radar-container');
    const grid = document.getElementById('news-grid');

    if (mode === 'todas') {
        container.style.display = 'block';
        grid.style.display = 'none';
        startRadar();
    } else {
        container.style.display = 'none';
        grid.style.display = 'grid';
        renderGrid(newsData.filter(n => n.cat === mode));
    }
}

function startRadar() {
    showSlide();
    slideInterval = setInterval(showSlide, 15000);
}

function showSlide() {
    const n = newsData[currentIndex];
    const pBar = document.getElementById('p-bar');
    
    // Reset progress bar
    pBar.style.transition = 'none';
    pBar.style.width = '0%';
    
    setTimeout(() => {
        pBar.style.transition = 'width 15s linear';
        pBar.style.width = '100%';
    }, 50);

    document.getElementById('s-img').src = n.img;
    document.getElementById('s-badge').innerText = n.cat;
    document.getElementById('s-title').innerText = n.titulo;
    document.getElementById('s-resumo').innerText = n.resumo;
    document.getElementById('s-fonte').innerText = n.fonte;
    document.getElementById('s-data').innerText = n.data;

    currentIndex = (currentIndex + 1) % newsData.length;
}

function renderGrid(list) {
    const grid = document.getElementById('news-grid');
    grid.innerHTML = list.map(n => `
        <div class="card" onclick="window.open('${n.url}', '_blank')">
            <img src="${n.img}">
            <div class="card-body">
                <span class="badge">${n.cat}</span>
                <h3 style="font-size:15px;">${n.titulo}</h3>
                <p style="font-size:11px; margin-top:10px; font-weight:700;">${n.fonte}</p>
            </div>
        </div>
    `).join('');
}

function openLink() {
    // Abre a notícia que estava no slide (o index já avançou, então pegamos o anterior)
    let idx = currentIndex === 0 ? newsData.length - 1 : currentIndex - 1;
    window.open(newsData[idx].url, '_blank');
}

window.onload = fetchData;
</script>
</body>
</html>
