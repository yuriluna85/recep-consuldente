<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consuldente News | Radar Odonto</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green-dark: #0d6b36; --green-mid: #1a8f4a; --green-light: #2eb25d;
            --green-pale: #e6f7ed; --gray-100: #f5f5f3; --gray-200: #e8e8e5;
            --gray-500: #7a7a75; --gray-700: #3a3a38; --gray-900: #111110;
            --white: #ffffff; --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        body { font-family: 'Sora', sans-serif; background: var(--gray-100); color: var(--gray-900); line-height: 1.6; }
        
        header { background: var(--white); border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 70px; display: flex; align-items: center; justify-content: space-between; }
        .logo-text { font-size: 22px; font-weight: 700; color: var(--green-dark); text-decoration: none; }
        .logo-text span { font-weight: 300; color: var(--gray-500); }

        .filter-bar { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 12px 0; overflow-x: auto; position: sticky; top: 70px; z-index: 90; }
        .filter-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; gap: 8px; }
        .chip { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--gray-200); background: white; cursor: pointer; white-space: nowrap; font-family: inherit; font-size: 13px; font-weight: 500; transition: 0.2s; }
        .chip.active { background: var(--green-dark); color: white; border-color: var(--green-dark); }

        main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; min-height: 80vh; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        
        .news-card { background: white; padding: 24px; border-radius: var(--radius); box-shadow: var(--card-shadow); transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; border: 1px solid transparent; }
        .news-card:hover { transform: translateY(-5px); border-color: var(--green-light); }
        
        .badge { font-size: 10px; font-weight: 700; text-transform: uppercase; background: var(--green-pale); color: var(--green-dark); padding: 4px 10px; border-radius: 20px; margin-bottom: 12px; width: fit-content; }
        .news-card h3 { font-family: 'DM Serif Display', serif; font-size: 1.2rem; margin-bottom: 10px; color: var(--gray-900); }
        .news-card p { font-size: 14px; color: var(--gray-500); flex-grow: 1; margin-bottom: 20px; }

        .card-footer { border-top: 1px solid var(--gray-100); padding-top: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        .source-label { font-weight: 700; color: var(--green-mid); text-transform: uppercase; }
        .date-label { color: var(--gray-500); }

        #status-msg { text-align: center; color: var(--gray-500); padding: 20px; font-size: 14px; }

        footer { background: var(--gray-900); color: white; padding: 40px 24px; text-align: center; margin-top: 50px; }
        footer span { color: var(--green-light); }

        @media (max-width: 600px) { .header-inner { justify-content: center; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="#" class="logo-text">🦷 Consuldente <span>News</span></a>
        <div style="font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase;">Atualizado a cada hora 🕒</div>
    </div>
</header>

<div class="filter-bar">
    <div class="filter-inner">
        <button class="chip active" onclick="filterNews('todas', this)">Todas</button>
        <button class="chip" onclick="filterNews('pesquisa', this)">Pesquisa</button>
        <button class="chip" onclick="filterNews('eventos', this)">Eventos</button>
        <button class="chip" onclick="filterNews('novidades', this)">Novidades</button>
    </div>
</div>

<main>
    <div id="status-msg">Carregando as últimas notícias...</div>
    <div class="grid" id="news-grid"></div>
</main>

<footer>
    <p>Consuldente News &mdash; Portal de Curadoria para Nerds da Odonto</p>
    <p style="font-size: 10px; margin-top: 10px; opacity: 0.5;">Fontes: CFO, Nature, Dental Tribune, ScienceDaily</p>
</footer>

<script>
let currentNews = [];

// Notícias de Backup (serão exibidas se o data.json ainda não tiver sido gerado pelo robô)
const backupNews = [
    {
        titulo: "Consuldente News: Iniciando Motores",
        resumo: "O robô de inteligência artificial está sendo configurado no seu GitHub para buscar notícias agora mesmo.",
        cat: "novidades",
        fonte: "Sistema",
        data: "Aguardando...",
        url: "#"
    }
];

// Função principal que busca os dados atualizados pelo GitHub Actions
async function loadNews() {
    const statusMsg = document.getElementById('status-msg');
    
    try {
        // Busca o arquivo JSON que o robô do GitHub Actions sobrescreve a cada hora
        // O parâmetro ?t= serve para evitar que o navegador cacheie o arquivo antigo
        const response = await fetch('./data.json?t=' + new Date().getTime());
        
        if (!response.ok) throw new Error('Arquivo não encontrado');
        
        currentNews = await response.json();
        statusMsg.style.display = 'none';
        renderNews(currentNews);
    } catch (e) {
        console.warn("Aguardando o arquivo data.json ser gerado pelo Workflow.");
        statusMsg.innerHTML = "Notícias sendo processadas pelo servidor. Exibindo backup...";
        currentNews = backupNews;
        renderNews(currentNews);
    }
}

// Função para desenhar os cards na tela
function renderNews(list) {
    const grid = document.getElementById('news-grid');
    grid.innerHTML = '';
    
    list.forEach(n => {
        grid.innerHTML += `
            <article class="news-card" onclick="window.open('${n.url}', '_blank')">
                <span class="badge">${n.cat}</span>
                <h3>${n.titulo}</h3>
                <p>${n.resumo}</p>
                <div class="card-footer">
                    <span class="source-label">${n.fonte}</span>
                    <span class="date-label">📅 ${n.data}</span>
                </div>
            </article>
        `;
    });
}

// Lógica de Filtros
function filterNews(cat, btn) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    
    if (cat === 'todas') {
        renderNews(currentNews);
    } else {
        renderNews(currentNews.filter(n => n.cat === cat));
    }
}

// Inicia o carregamento ao abrir a página
window.onload = loadNews;
</script>
</body>
</html>
