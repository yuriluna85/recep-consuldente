<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSULDENTE NEWS - Painel de Recepção</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

        :root {
            --primario: #003049;
            --accent: #669bbc;
            --detalhe: #c1121f;
            --bg: #0a0f1a;
            --surface: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0; padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            flex-shrink: 0;
            min-height: 16vh;
            background: linear-gradient(135deg, #003049 0%, #00405e 100%);
            display: flex; justify-content: space-between;
            align-items: center; padding: 15px 50px;
            border-bottom: 4px solid var(--accent);
            position: relative;
            z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-consuldente { height: 80px; width: auto; border-radius: 10px; }

        .logo-text h1 { margin: 0; font-size: 2.4rem; font-weight: 900; color: #fff; line-height: 1; }
        .logo-text .subtitle { font-size: 0.8rem; color: rgba(255,255,255,0.7); letter-spacing: 2px; text-transform: uppercase; }
        
        .controls-area { text-align: center; position: absolute; left: 50%; transform: translateX(-50%); }
        .btn-fullscreen {
            background: rgba(255,255,255,0.1); border: 1px solid var(--accent);
            color: #fff; padding: 6px 15px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 700; cursor: pointer;
            text-transform: uppercase; margin-bottom: 8px;
        }

        .clock-area { text-align: right; min-width: 250px; }
        #clock { font-size: 4.8rem; font-weight: 900; line-height: 0.9; color: #fff; letter-spacing: -2px; }
        #date-top { font-size: 1.4rem; color: #fff; font-weight: 600; text-transform: uppercase; margin-top: 5px; }

        .nav-bar {
            flex-shrink: 0;
            height: 6vh; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 50px; gap: 10px;
            border-bottom: 1px solid var(--border);
            z-index: 90;
        }

        .btn-filter {
            background: none; border: none; color: rgba(255,255,255,0.5);
            font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; transition: 0.25s; padding: 6px 20px;
            border-radius: 30px; text-transform: uppercase;
        }
        .btn-filter.active { color: #fff; background: var(--accent); }

        main { flex-grow: 1; position: relative; overflow: hidden; background: #000; }

        #carousel { width: 100%; height: 100%; position: relative; }

        /* ESTILO DOS SLIDES PARA TRANSIÇÃO SUAVE */
        .slide { 
            position: absolute; inset: 0; 
            opacity: 0; 
            /* Transição de opacidade de 2 segundos para o efeito de cross-fade */
            transition: opacity 2s ease-in-out; 
            display: flex; align-items: flex-end;
            z-index: 1;
        }
        .slide.active { opacity: 1; z-index: 10; }

        .slide-bg { 
            position: absolute; inset: 0; 
            background-size: cover;
            background-position: center; 
            background-repeat: no-repeat;
            z-index: -1; 
            /* Transform inicial */
            transform: scale(1);
            /* Transição de zoom lenta (12s) para evitar o pulo abrupto */
            transition: transform 12s linear;
        }

        /* Quando o slide está ativo, ele cresce suavemente */
        .slide.active .slide-bg { transform: scale(1.12); }

        .slide-bg.is-fallback { background-size: 40%; background-color: #050a14; }

        .slide-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 50%, transparent 100%); 
        }

        .slide-info { position: relative; z-index: 20; width: 100%; padding: 60px 50px 100px; }
        .tag { background: var(--detalhe); color: #fff; padding: 8px 18px; border-radius: 4px; font-weight: 800; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 15px; display: inline-block; }
        
        .post-date {
            font-size: 1.1rem; color: var(--accent); font-weight: 600;
            margin-bottom: 10px; text-transform: uppercase;
            display: flex; align-items: center; gap: 10px;
        }

        .title { font-size: 3.8rem; font-weight: 900; line-height: 1.1; margin: 0; text-shadow: 0 5px 20px rgba(0,0,0,1); max-width: 85%; }

        #grid-view { display: none; padding: 40px 50px; grid-template-columns: repeat(3, 1fr); gap: 25px; height: 100%; overflow-y: auto; background: var(--bg); }
        .slide-dots { position: absolute; bottom: 40px; right: 50px; z-index: 30; display: flex; gap: 10px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.2); }
        .dot.active { background: #fff; width: 30px; border-radius: 5px; }

        .news-card { background: var(--surface); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
        .card-img { height: 180px; background-size: cover; background-position: center; background-repeat: no-repeat; }
        .card-img.is-fallback { background-size: contain; background-color: #050a14; }
        .card-txt { padding: 20px; }
        .card-source { font-size: 0.75rem; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        .card-txt h3 { margin: 0; font-size: 1.1rem; color: #fff; line-height: 1.4; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="https://github.com/yuriluna85/recep-consuldente/blob/main/consudente.png?raw=true" alt="Logo Consuldente" class="logo-consuldente">
        <div class="logo-text">
            <h1>CONSULDENTE</h1>
            <div class="subtitle">News &amp; Odonto-Update</div>
        </div>
    </div>
    <div class="controls-area">
        <button class="btn-fullscreen" onclick="toggleFullScreen()">⛶ Expandir Tela</button>
        <div style="font-size: 0.6rem; color: rgba(255,255,255,0.4); margin-top: 5px;">F11 OU ESC PARA SAIR</div>
    </div>
    <div class="clock-area">
        <div id="clock">00:00</div>
        <div id="date-top">-- de -- de ----</div>
    </div>
</header>

<div class="nav-bar">
    <button class="btn-filter active" onclick="changeTab('Todos', this)">⊡ Geral (Mix)</button>
    <button class="btn-filter" onclick="changeTab('Feira', this)">Feira Local</button>
    <button class="btn-filter" onclick="changeTab('Educação', this)">IFBaiano</button>
    <button class="btn-filter" onclick="changeTab('G1 Geral', this)">G1 Brasil</button>
</div>

<main>
    <div id="carousel"></div>
    <div id="slide-dots" class="slide-dots"></div>
    <div id="grid-view"></div>
</main>

<script>
    const FONTES = [
        {"nome": "G1 Geral", "url": "https://api.rss2json.com/v1/api.json?rss_url=https://g1.globo.com/dynamo/rss2.xml", "cat": "BRASIL", "rss": true},
        {"nome": "Acorda Cidade", "url": "https://www.acordacidade.com.br/wp-json/wp/v2/posts", "cat": "FEIRA"},
        {"nome": "IFBaiano", "url": "https://www.ifbaiano.edu.br/portal/wp-json/wp/v2/posts", "cat": "EDUCAÇÃO"},
        {"nome": "G1 Feira", "url": "https://api.rss2json.com/v1/api.json?rss_url=https://g1.globo.com/dynamo/ba/feira-de-santana-regiao/rss2.xml", "cat": "FEIRA", "rss": true},
        {"nome": "Folha do Estado", "url": "https://www.jornalfolhadoestado.com/wp-json/wp/v2/posts", "cat": "FEIRA"}
    ];

    let dataStore = [];
    let slideIdx = 0;
    let autoPlay;
    const IMG_DEFAULT = "https://github.com/yuriluna85/recep-consuldente/blob/main/consudente.png?raw=true";

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => console.log(err));
        } else {
            document.exitFullscreen();
        }
    }

    function startClock() {
        const update = () => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date-top').innerText = now.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
        };
        setInterval(update, 1000); update();
    }

    async function fetchNews() {
        let temp = [];
        for (const f of FONTES) {
            try {
                const response = await fetch(f.url + (f.rss ? "" : "?per_page=15&_embed&_t=" + Date.now()));
                const rawData = await response.json();
                const posts = f.rss ? rawData.items : rawData;
                
                posts.forEach(p => {
                    let thumb = null;
                    let isFallback = false;
                    if (!f.rss) {
                        if (p._embedded && p._embedded['wp:featuredmedia']) thumb = p._embedded['wp:featuredmedia'][0].source_url;
                        else if (p.content && p.content.rendered.match(/src="([^"]+)"/)) thumb = p.content.rendered.match(/src="([^"]+)"/)[1];
                    } else { thumb = p.thumbnail || (p.enclosure ? p.enclosure.link : null); }
                    
                    if (!thumb) { thumb = IMG_DEFAULT; isFallback = true; }

                    temp.push({
                        id: (f.rss ? (p.guid || p.link) : p.id).toString(),
                        title: (f.rss ? p.title : p.title.rendered).replace(/&#8211;/g, '–').replace(/&#8220;/g, '"').replace(/&#8221;/g, '"').replace(/<[^>]*>?/gm, ''),
                        source: f.nome, img: thumb, isFallback: isFallback, date: new Date(f.rss ? p.pubDate : p.date), cat: f.cat
                    });
                });
            } catch (e) { console.warn("Erro: " + f.nome); }
        }
        const map = new Map();
        temp.forEach(item => { if(!map.has(item.id)) map.set(item.id, item); });
        dataStore = Array.from(map.values());
        render(); 
    }

    function changeTab(tab, btn) {
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const carousel = document.getElementById('carousel');
        const grid = document.getElementById('grid-view');
        const dots = document.getElementById('slide-dots');
        if (tab === 'Todos') {
            carousel.style.display = 'block'; dots.style.display = 'flex'; grid.style.display = 'none';
            render();
        } else {
            carousel.style.display = 'none'; dots.style.display = 'none'; grid.style.display = 'grid';
            renderGrid(tab);
        }
    }

    function render() {
        const carousel = document.getElementById('carousel');
        const dotsEl = document.getElementById('slide-dots');
        let queues = {};
        FONTES.forEach(f => { queues[f.nome] = dataStore.filter(n => n.source === f.nome).sort((a,b) => b.date - a.date); });
        let mixedNews = [];
        let hasMore = true;
        let index = 0;
        while(hasMore && mixedNews.length < 60) {
            hasMore = false;
            for(let fonte of FONTES) {
                if(queues[fonte.nome][index]) { mixedNews.push(queues[fonte.nome][index]); hasMore = true; }
            }
            index++;
        }
        if (mixedNews.length === 0) return;
        if (slideIdx >= mixedNews.length) slideIdx = 0;

        carousel.innerHTML = mixedNews.map((n, i) => {
            const dataPost = n.date.toLocaleDateString('pt-BR');
            const horaPost = n.date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            return `
                <div class="slide ${i === slideIdx ? 'active' : ''}">
                    <div class="slide-bg ${n.isFallback ? 'is-fallback' : ''}" style="background-image: url('${n.img}')"></div>
                    <div class="slide-overlay"></div>
                    <div class="slide-info">
                        <span class="tag">${n.source}</span>
                        <div class="post-date">📅 ${dataPost} às ${horaPost}</div>
                        <h2 class="title">${n.title}</h2>
                    </div>
                </div>
            `;
        }).join('');

        dotsEl.innerHTML = mixedNews.map((_, i) => `<div class="dot ${i === slideIdx ? 'active' : ''}"></div>`).join('');
        clearInterval(autoPlay);
        autoPlay = setInterval(nextSlide, 10000);
    }

    function nextSlide() {
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        if (slides.length < 2) return;
        
        slides[slideIdx].classList.remove('active');
        dots[slideIdx].classList.remove('active');
        slideIdx = (slideIdx + 1) % slides.length;
        slides[slideIdx].classList.add('active');
        dots[slideIdx].classList.add('active');
    }

    function renderGrid(tab) {
        const grid = document.getElementById('grid-view');
        const filtered = dataStore.filter(n => {
            if (tab === 'Feira') return n.cat === 'FEIRA';
            if (tab === 'Educação') return n.cat === 'EDUCAÇÃO';
            return n.source === tab;
        }).sort((a,b) => b.date - a.date);
        grid.innerHTML = filtered.map(n => `
            <div class="news-card">
                <div class="card-img ${n.isFallback ? 'is-fallback' : ''}" style="background-image: url('${n.img}')"></div>
                <div class="card-txt">
                    <div class="card-source">${n.source} | ${n.date.toLocaleDateString('pt-BR')}</div>
                    <h3>${n.title}</h3>
                </div>
            </div>
        `).join('');
    }

    startClock();
    fetchNews();
    setInterval(fetchNews, 1800000); 
</script>
</body>
</html>
