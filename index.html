<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Odonto - Recepção</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { 
            /* Nova Paleta: Saúde/Odonto */
            --odonto-primario: #0077b6; 
            --odonto-secundario: #00b4d8; 
            --odonto-dark: #023e8a;
            --bg-light: #f8fdff;
            --card-bg: rgba(255, 255, 255, 0.98);
            --txt-primario: #2b2d42;
            --txt-secundario: #6c757d;
        }
        
        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: linear-gradient(-45deg, #ffffff, #eef9ff, #f0f4f8, #ffffff);
            background-size: 400% 400%;
            animation: meshGradient 20s ease infinite;
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column;
        }
        
        header { 
            background: #fff; 
            padding: 15px 35px; border-radius: 0 0 25px 25px; 
            box-shadow: 0 4px 20px rgba(0,119,182,0.1);
            border-bottom: 6px solid var(--odonto-primario);
            margin-bottom: 20px;
            display: flex; align-items: center; position: relative;
        }
        
        .header-left { display: flex; align-items: center; margin-right: auto; }
        .logo-placeholder { 
            width: 60px; height: 60px; 
            background: var(--odonto-primario); 
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 30px;
        }
        h1 { color: var(--odonto-dark); font-size: 1.6rem; margin: 0; font-weight: 800; margin-left: 20px; }
        
        .header-right { text-align: right; border-left: 2px solid #eee; padding-left: 20px; }
        #clock { font-size: 2rem; font-weight: 900; color: var(--odonto-dark); line-height: 1; }
        #date-top { font-size: 0.85rem; color: var(--odonto-secundario); font-weight: 700; text-transform: uppercase; }

        .main-content { padding: 0 20px 100px 20px; flex: 1; }

        .progress-container { max-width: 1200px; margin: 0 auto 10px auto; height: 6px; background: #e0e0e0; border-radius: 10px; overflow: hidden; }
        #bar-fill { width: 100%; height: 100%; background: var(--odonto-secundario); transition: width 1s linear; }
        
        #status-console { 
            font-family: 'Courier New', monospace; font-size: 0.8rem; color: #00b4d8; 
            background: #0d1b2a; padding: 10px; border-radius: 8px; 
            max-width: 1200px; margin: 0 auto 20px auto;
        }

        .filters { max-width: 1200px; margin: 15px auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .btn-filter { background: #fff; border: 1px solid #ddd; color: var(--txt-secundario); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.3s; }
        .btn-filter.active, .btn-filter:hover { background: var(--odonto-primario); color: #fff; border-color: var(--odonto-primario); transform: translateY(-2px); }

        #news-container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1024px) { #news-container { grid-template-columns: 1fr 1fr; } .featured { grid-column: 1 / span 2; } }

        .card { display: flex; background: var(--card-bg); border-radius: 15px; overflow: hidden; text-decoration: none; color: inherit; height: 180px; border-left: 8px solid var(--odonto-secundario); transition: 0.3s; box-shadow: 0 6px 15px rgba(0,0,0,0.05); }
        .card.featured { height: 220px; border-left-color: var(--odonto-dark); }
        .card:hover { transform: scale(1.01); box-shadow: 0 10px 25px rgba(0,0,182,0.1); }

        .img-box { position: relative; width: 30%; min-width: 180px; height: 100%; background: #f0f4f8; overflow: hidden; }
        .img-src { width: 100%; height: 100%; background-size: cover; background-position: center; transition: 0.5s; }
        .badge { position: absolute; top: 0; left: 0; background: var(--odonto-primario); color: #fff; font-size: 0.7rem; font-weight: 800; padding: 6px 12px; border-bottom-right-radius: 12px; text-transform: uppercase; }

        .info { padding: 20px; display: flex; flex-direction: column; justify-content: center; width: 70%; }
        .title { margin: 0; font-size: 1.2rem; line-height: 1.3; font-weight: 700; color: var(--odonto-dark); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .source-tag { font-size: 0.75rem; color: var(--odonto-secundario); font-weight: 800; margin-bottom: 5px; text-transform: uppercase; }
        .date { font-size: 0.85rem; color: var(--txt-secundario); margin-top: 10px; }

        footer {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px);
            padding: 12px; position: fixed; bottom: 0; width: 100%;
            display: flex; justify-content: center; border-top: 1px solid #eee; z-index: 1000;
        }

        .btn-pdf { 
            background: var(--odonto-dark); color: white; border: none; 
            padding: 10px 25px; border-radius: 25px; cursor: pointer; 
            font-size: 0.85rem; font-weight: 700; transition: 0.3s;
        }
        .btn-pdf:hover { background: #000; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logo-placeholder">🦷</div>
        <h1>Radar Odonto & Notícias</h1>
    </div>
    <div class="header-right">
        <div id="date-top">-- de -- de ----</div>
        <div id="clock">00:00:00</div>
    </div>
</header>

<div class="main-content">
    <div class="progress-container"><div id="bar-fill"></div></div>
    <div id="status-console">> Sistema de Monitoramento Odontológico Iniciado...</div>

    <div class="filters" id="filters">
        <button id="btn-todos" class="btn-filter active" onclick="filterBySource('Todos', this)">Todas as Notícias</button>
    </div>

    <div id="news-container"></div>
</div>

<footer>
    <button class="btn-pdf" onclick="gerarRelatorioPDF()">
        📄 Exportar Relatório (<span id="pdf-context">Geral</span>)
    </button>
</footer>

<script>
    // Configuração das Fontes
    const FONTES = [
        {"nome": "CFO Federal", "url": "https://website.cfo.org.br/wp-json/wp/v2/posts", "cat": "ODONTOLOGIA"},
        {"nome": "CRO-BA", "url": "https://croba.org.br/wp-json/wp/v2/posts", "cat": "ODONTOLOGIA"},
        {"nome": "ABO-BA", "url": "https://abo-ba.org.br/wp-json/wp/v2/posts", "cat": "ODONTOLOGIA"},
        {"nome": "Acorda Cidade", "url": "https://www.acordacidade.com.br/wp-json/wp/v2/posts", "cat": "FEIRA DE SANTANA"},
        {"nome": "Portal da Feira", "url": "https://portaldafeira.com.br/wp-json/wp/v2/posts", "cat": "FEIRA DE SANTANA"},
        {"nome": "Folha do Estado", "url": "https://www.jornalfolhadoestado.com/wp-json/wp/v2/posts", "cat": "FEIRA DE SANTANA"},
        {"nome": "G1 Feira", "url": "RSS_PROXY", "cat": "FEIRA DE SANTANA", "isRSS": true, "rssUrl": "https://g1.globo.com/dynamo/ba/feira-de-santana-regiao/rss2.xml"}
    ];

    let timer = 180; // 3 minutos para recepção
    let dataStore = [];
    let currentFilter = 'Todos';
    const FALLBACK_IMG = "https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?auto=format&fit=crop&q=80&w=400";

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
        document.getElementById('date-top').innerText = now.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
    }
    setInterval(updateClock, 1000); updateClock();

    // Gerar Botões de Filtro
    FONTES.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'btn-filter'; btn.innerText = f.nome;
        btn.onclick = (e) => filterBySource(f.nome, e.target);
        document.getElementById('filters').appendChild(btn);
    });

    setInterval(() => {
        timer--;
        document.getElementById('bar-fill').style.width = (timer / 180 * 100) + "%";
        if (timer <= 0) { timer = 180; fetchAllNews(); }
    }, 1000);

    async function fetchAllNews() {
        const consoleLog = document.getElementById('status-console');
        consoleLog.innerText = "> Atualizando fontes de notícias...";
        let tempBatch = [];

        for (const fonte of FONTES) {
            try {
                if (fonte.isRSS) {
                    // Simulação/Tratamento simplificado para RSS via serviço gratuito (ex: rss2json)
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(fonte.rssUrl)}`);
                    const data = await res.json();
                    data.items.slice(0, 5).forEach(item => {
                        tempBatch.push({
                            title: item.title,
                            link: item.link,
                            date: new Date(item.pubDate),
                            source: fonte.nome,
                            cat: fonte.cat,
                            img: item.thumbnail || FALLBACK_IMG
                        });
                    });
                } else {
                    const response = await fetch(`${fonte.url}?per_page=5&_embed&_t=${Date.now()}`);
                    const posts = await response.json();
                    posts.forEach(post => {
                        let img = FALLBACK_IMG;
                        if (post._embedded && post._embedded['wp:featuredmedia']) {
                            img = post._embedded['wp:featuredmedia'][0].source_url;
                        }
                        tempBatch.push({
                            title: post.title.rendered.replace(/&#8211;/g, '-').replace(/&#8220;/g, '"').replace(/&#8221;/g, '"'),
                            link: post.link,
                            date: new Date(post.date),
                            source: fonte.nome,
                            cat: fonte.cat,
                            img: img
                        });
                    });
                }
            } catch (e) {
                console.error(`Erro em ${fonte.nome}:`, e);
            }
        }

        dataStore = tempBatch.sort((a, b) => b.date - a.date);
        render();
        consoleLog.innerText = `> Atualizado: ${new Date().toLocaleTimeString('pt-BR')} | Total de notícias: ${dataStore.length}`;
    }

    function filterBySource(nome, btn) {
        currentFilter = nome;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('pdf-context').innerText = nome;
        render();
    }

    function render() {
        const container = document.getElementById('news-container');
        let list = (currentFilter === 'Todos') ? dataStore : dataStore.filter(n => n.source === currentFilter);
        
        if (list.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:gray;'>Buscando notícias...</p>";
            return;
        }

        container.innerHTML = list.map((n, index) => `
            <a href="${n.link}" target="_blank" class="card ${(index === 0 && currentFilter === 'Todos') ? 'featured' : ''}">
                <div class="img-box">
                    <div class="img-src" style="background-image: url('${n.img}')"></div>
                    <div class="badge">${n.cat}</div>
                </div>
                <div class="info">
                    <span class="source-tag">${n.source}</span>
                    <h2 class="title">${n.title}</h2>
                    <div class="date">📅 ${n.date.toLocaleDateString('pt-BR')} às ${n.date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            </a>`).join('');
    }

    async function gerarRelatorioPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const now = new Date();
        
        let reportData = (currentFilter === 'Todos') ? dataStore : dataStore.filter(n => n.source === currentFilter);

        doc.setFont("helvetica", "bold");
        doc.text(`Radar de Notícias - ${currentFilter}`, 14, 20);
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text(`Gerado em: ${now.toLocaleString('pt-BR')}`, 14, 28);

        const rows = reportData.map(n => [
            n.date.toLocaleDateString('pt-BR'),
            n.source,
            n.title
        ]);

        doc.autoTable({
            startY: 35,
            head: [['Data', 'Fonte', 'Título']],
            body: rows,
            headStyles: { fillColor: [0, 119, 182] }
        });

        doc.save(`Radar_Odonto_${currentFilter.replace(/\s/g, '_')}.pdf`);
    }

    // Início automático
    fetchAllNews();
</script>
</body>
</html>
