<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consuldente News | Radar Odonto</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green-dark: #0d6b36; --green-mid: #1a8f4a; --green-light: #2eb25d;
            --gray-100: #f5f5f3; --gray-200: #e8e8e5; --gray-500: #7a7a75;
            --gray-900: #111110; --white: #ffffff; --radius: 12px;
        }
        body { font-family: 'Sora', sans-serif; background: var(--gray-100); color: var(--gray-900); }
        header { background: var(--white); border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 100; padding: 15px 24px; }
        .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 22px; font-weight: 700; color: var(--green-dark); text-decoration: none; }
        .logo span { font-weight: 300; color: var(--gray-500); }

        .filter-bar { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 12px 0; position: sticky; top: 65px; z-index: 90; }
        .filter-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; gap: 10px; overflow-x: auto; }
        .chip { padding: 8px 20px; border-radius: 25px; border: 1px solid var(--gray-200); background: white; cursor: pointer; white-space: nowrap; font-size: 13px; transition: 0.3s; }
        .chip.active { background: var(--green-dark); color: white; border-color: var(--green-dark); }

        main { max-width: 1200px; margin: 0 auto; padding: 30px 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .badge { font-size: 10px; font-weight: 700; text-transform: uppercase; background: #e6f7ed; color: var(--green-dark); padding: 4px 10px; border-radius: 4px; margin-bottom: 12px; width: fit-content; }
        .card h3 { font-family: 'DM Serif Display', serif; font-size: 18px; margin-bottom: 10px; line-height: 1.3; }
        .card p { font-size: 13px; color: var(--gray-500); margin-bottom: 15px; }
        
        .card-footer { margin-top: auto; padding-top: 15px; border-top: 1px solid var(--gray-100); display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; }
        .source { color: var(--green-mid); }

        footer { text-align: center; padding: 40px; color: var(--gray-500); font-size: 13px; }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="#" class="logo">🦷 Consuldente <span>News</span></a>
        <div id="update-timer" style="font-size: 11px; color: var(--gray-500);">Radar Ativo 📡</div>
    </div>
</header>

<div class="filter-bar">
    <div class="filter-inner">
        <button class="chip active" onclick="filter('todas', this)">Todas</button>
        <button class="chip" onclick="filter('pesquisa', this)">Pesquisa</button>
        <button class="chip" onclick="filter('novidades', this)">Novidades</button>
    </div>
</div>

<main>
    <div class="grid" id="news-grid"></div>
</main>

<footer>
    © 2026 Consuldente News — Atualizado automaticamente via GitHub Actions
</footer>

<script>
let newsData = [];

async function load() {
    try {
        const res = await fetch('./data.json?v=' + Date.now());
        newsData = await res.json();
        render(newsData);
    } catch (e) {
        document.getElementById('news-grid').innerHTML = "<p>Iniciando radar... Aguarde a primeira atualização do robô.</p>";
    }
}

function render(list) {
    const grid = document.getElementById('news-grid');
    grid.innerHTML = list.map(n => `
        <article class="card" onclick="window.open('${n.url}', '_blank')">
            <img src="${n.img}" class="card-img" alt="Foto">
            <div class="card-body">
                <span class="badge">${n.cat}</span>
                <h3>${n.titulo}</h3>
                <p>${n.resumo}</p>
                <div class="card-footer">
                    <span class="source">${n.fonte}</span>
                    <span>${n.data}</span>
                </div>
            </div>
        </article>
    `).join('');
}

function filter(cat, btn) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    render(cat === 'todas' ? newsData : newsData.filter(n => n.cat === cat));
}

window.onload = load;
</script>
</body>
</html>
