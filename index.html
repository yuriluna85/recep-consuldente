<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSULDENTE NEWS - Painel de Recepção</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

        :root {
            --primario: #003049;
            --accent: #669bbc;
            --detalhe: #c1121f;
            --bg: #0a0f1a;
            --surface: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0; padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* OVERLAY DE ENTRADA (Necessário para Fullscreen) */
        #entry-overlay {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
        }
        .entry-btn {
            padding: 20px 40px; border: 2px solid var(--accent);
            border-radius: 50px; color: #fff; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        /* HEADER */
        header {
            height: 14vh;
            background: linear-gradient(135deg, #003049 0%, #00405e 100%);
            display: flex; justify-content: space-between;
            align-items: center; padding: 0 50px;
            border-bottom: 3px solid var(--accent);
            position: relative;
        }

        .fs-info {
            position: absolute; bottom: 5px; left: 50%;
            transform: translateX(-50%); font-size: 0.6rem;
            color: rgba(255,255,255,0.3); text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo-area { display: flex; align-items: center; gap: 22px; }
        .logo-icon-wrap {
            width: 72px; height: 72px; background: rgba(255,255,255,0.15);
            border-radius: 18px; display: flex; align-items: center;
            justify-content: center; font-size: 2.8rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .logo-text h1 { margin: 0; font-size: 2.6rem; font-weight: 900; color: #fff; }
        .logo-text .subtitle { font-size: 0.85rem; color: rgba(255,255,255,0.6); letter-spacing: 3px; text-transform: uppercase; }
        .badge { background: var(--detalhe); color: #fff; font-size: 0.65rem; font-weight: 700; padding: 3px 10px; border-radius: 4px; text-transform: uppercase; margin-bottom: 5px; display: inline-block; }

        .clock-area { text-align: right; }
        #clock { font-size: 5rem; font-weight: 900; line-height: 1; color: #fff; letter-spacing: -3px; }
        #date-top { font-size: 0.95rem; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-top: 4px; }

        /* NAV BAR */
        .nav-bar {
            height: 6vh; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 50px; gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .btn-filter {
            background: none; border: none; color: rgba(255,255,255,0.45);
            font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.8rem;
            cursor: pointer; transition: 0.25s; padding: 6px 18px;
            border-radius: 30px; text-transform: uppercase;
        }

        .btn-filter.active { color: #fff; background: var(--accent); }

        #status { font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-left: auto; display: flex; align-items: center; gap: 8px; }
        #status-dot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; }

        /* MAIN / CAROUSEL */
        main { flex: 1; position: relative; overflow: hidden; }
        #carousel { width: 100%; height: 100%; position: relative; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.8s ease-in-out; display: flex; }
        .slide.active { opacity: 1; z-index: 10; }
        .slide-bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: -1; }
        .slide.active .slide-bg { animation: kenBurns 14s ease-in-out forwards; }
        
        @keyframes kenBurns { from { transform: scale(1); } to { transform: scale(1.12); } }

        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, transparent 100%); }
        .slide-info { position: relative; z-index: 1; width: 60%; padding: 0 60px; display: flex; flex-direction: column; justify-content: center; }
        .tag { background: var(--detalhe); color: #fff; padding: 5px 16px; border-radius: 4px; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 15px; display: inline-block; width: fit-content; }
        .title { font-size: 3.8rem; font-weight: 900; line-height: 1.08; margin: 0 0 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* GRID VIEW */
        #grid-view { display: none; padding: 35px 50px; grid-template-columns: repeat(3, 1fr); gap: 24px; height: 100%; overflow-y: auto; background: var(--bg); }
        .news-card { background: var(--surface); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .card-img { height: 190px; background-size: cover; background-position: center; }
        .card-txt { padding: 20px; flex: 1; }
        .card-source { font-size: 0.7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
        .card-txt h3 { margin: 0; font-size: 1.05rem; line-height: 1.45; color: rgba(255,255,255,0.9); }

        .slide-dots { position: absolute; bottom: 30px; right: 50px; z-index: 20; display: flex; gap: 8px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.25); }
        .dot.active { background: #fff; width: 24px; border-radius: 3px; }
    </style>
</head>
<body onclick="toggleFullScreen()">

<div id="entry-overlay">
    <div class="entry-btn">Clique para iniciar o Painel</div>
</div>

<header>
    <div class="logo-area">
        <div class="logo-icon-wrap">🦷</div>
        <div class="logo-text">
            <span class="badge">ao vivo</span>
            <h1>CONSULDENTE</h1>
            <div class="subtitle">News &amp; Odonto-Update</div>
        </div>
    </div>
    <div class="fs-info">Para sair da tela cheia tecle ESC ou F11</div>
    <div class="clock-area">
        <div id="clock">00:00</div>
        <div id="date-top">carregando...</div>
    </div>
</header>

<div class="nav-bar">
    <button class="btn-filter active" onclick="changeTab('Todos', this)">⊡ Geral</button>
    <button class="btn-filter" onclick="changeTab('CFO Federal', this)">CFO Federal</button>
    <button class="btn-filter" onclick="changeTab('ABO', this)">ABO Nacional</button>
    <button class="btn-filter" onclick="changeTab('Feira', this)">Feira de Santana</button>
    <div id="status">
        <span id="status-dot"></span>
        <span id="status-text">Sincronizando...</span>
    </div>
</div>

<main>
    <div id="carousel"></div>
    <div id="slide-dots" class="slide-dots"></div>
    <div id="grid-view"></div>
</main>

<script>
    // FONTES ATUALIZADAS: ABO via RSS Proxy para maior compatibilidade
    const FONTES = [
        {"nome": "CFO Federal", "url": "https://website.cfo.org.br/wp-json/wp/v2/posts", "cat": "ODONTO"},
        {"nome": "ABO", "url": "https://api.rss2json.com/v1/api.json?rss_url=https://www.abo.org.br/feed", "cat": "ODONTO", "rss": true},
        {"nome": "Acorda Cidade", "url": "https://www.acordacidade.com.br/wp-json/wp/v2/posts", "cat": "FEIRA"},
        {"nome": "G1 Feira", "url": "https://api.rss2json.com/v1/api.json?rss_url=https://g1.globo.com/dynamo/ba/feira-de-santana-regiao/rss2.xml", "cat": "NOTÍCIAS", "rss": true}
    ];

    let dataStore = [];
    let slideIdx = 0;
    let autoPlay;
    const IMG_DEFAULT = "https://images.unsplash.com/photo-1606811841689-23dfddce3e95?q=80&w=1920&auto=format&fit=crop";

    // TELA CHEIA AUTOMÁTICA E MANUAL
    function toggleFullScreen() {
        const overlay = document.getElementById('entry-overlay');
        if (overlay) overlay.style.display = 'none';

        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Erro ao tentar modo tela cheia: ${err.message}`);
            });
        }
    }

    // Monitora Teclas F11 e ESC
    window.addEventListener('keydown', (e) => {
        if (e.key === 'F11') {
            e.preventDefault(); 
            toggleFullScreen();
        }
    });

    function startClock() {
        const update = () => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date-top').innerText = now.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
        };
        setInterval(update, 1000); update();
    }

    async function fetchNews() {
        document.getElementById('status-text').innerText = 'Atualizando...';
        let temp = [];

        for (const f of FONTES) {
            try {
                const response = await fetch(f.url + (f.rss ? "" : "?per_page=8&_embed&_t=" + Date.now()));
                const rawData = await response.json();
                const posts = f.rss ? rawData.items : rawData;

                posts.forEach(p => {
                    let thumb = IMG_DEFAULT;
                    if (!f.rss && p._embedded && p._embedded['wp:featuredmedia']) {
                        thumb = p._embedded['wp:featuredmedia'][0].source_url;
                    } else if (f.rss && p.thumbnail) {
                        thumb = p.thumbnail;
                    } else if (f.rss && p.enclosure && p.enclosure.link) {
                        thumb = p.enclosure.link;
                    }

                    temp.push({
                        title: (f.rss ? p.title : p.title.rendered).replace(/&#8211;/g, '–').replace(/&#8220;/g, '"').replace(/&#8221;/g, '"'),
                        source: f.nome,
                        cat: f.cat,
                        img: thumb,
                        date: new Date(f.rss ? p.pubDate : p.date)
                    });
                });
            } catch (e) { console.warn("Erro: " + f.nome); }
        }

        // Ordenação global por data para o "Geral" funcionar corretamente
        dataStore = temp.sort((a, b) => b.date - a.date);
        document.getElementById('status-text').innerText = dataStore.length + ' notícias carregadas';
        render();
    }

    function changeTab(tab, btn) {
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const carousel = document.getElementById('carousel');
        const grid = document.getElementById('grid-view');
        const dots = document.getElementById('slide-dots');

        if (tab === 'Todos') {
            carousel.style.display = 'block'; dots.style.display = 'flex'; grid.style.display = 'none';
        } else {
            carousel.style.display = 'none'; dots.style.display = 'none'; grid.style.display = 'grid';
            renderGrid(tab);
        }
    }

    function render() {
        const carousel = document.getElementById('carousel');
        const dotsEl = document.getElementById('slide-dots');
        // Pega as 12 notícias mais recentes de TODAS as fontes para o carrossel
        const topNews = dataStore.slice(0, 12);

        carousel.innerHTML = topNews.map((n, i) => `
            <div class="slide ${i === 0 ? 'active' : ''}">
                <div class="slide-bg" style="background-image: url('${n.img}')"></div>
                <div class="slide-overlay"></div>
                <div class="slide-info">
                    <span class="tag">${n.source} | ${n.cat}</span>
                    <h2 class="title">${n.title}</h2>
                    <div class="slide-time">Publicado em ${n.date.toLocaleDateString('pt-BR')} às ${n.date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            </div>
        `).join('');

        dotsEl.innerHTML = topNews.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('');
        slideIdx = 0;
        clearInterval(autoPlay);
        autoPlay = setInterval(() => nextSlide(topNews.length), 10000);
    }

    function nextSlide(total) {
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        if (slides.length < 2) return;
        slides[slideIdx].classList.remove('active');
        dots[slideIdx].classList.remove('active');
        slideIdx = (slideIdx + 1) % slides.length;
        slides[slideIdx].classList.add('active');
        dots[slideIdx].classList.add('active');
    }

    function renderGrid(tab) {
        const grid = document.getElementById('grid-view');
        const filtered = dataStore.filter(n => tab === 'Feira' ? (n.source === 'G1 Feira' || n.source === 'Acorda Cidade') : n.source === tab);
        
        grid.innerHTML = filtered.map(n => `
            <div class="news-card">
                <div class="card-img" style="background-image: url('${n.img}')"></div>
                <div class="card-txt">
                    <div class="card-source">${n.source}</div>
                    <h3>${n.title}</h3>
                    <div class="card-date">${n.date.toLocaleDateString('pt-BR')}</div>
                </div>
            </div>
        `).join('');
    }

    startClock();
    fetchNews();
    setInterval(fetchNews, 600000);
</script>
</body>
</html>
