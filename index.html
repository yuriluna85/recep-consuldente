<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consuldente News | Painel Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root { 
            --green: #0d6b36; 
            --celeste: #F0F8FF; /* Azul Celeste: Descanso visual */
            --white: #ffffff; 
        }

        body { 
            font-family: 'Sora', sans-serif; 
            background-color: var(--celeste); 
            color: #1a2a3a; 
            overflow: hidden; /* Evita scroll na tela de painel */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header { 
            background: var(--white); 
            padding: 15px 40px; 
            border-bottom: 2px solid #d1e3f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 26px; font-weight: 700; color: var(--green); text-decoration: none; }
        .clock { font-size: 22px; font-weight: 700; color: #507ea1; }

        main { 
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        /* Container do Painel Expandido */
        #radar-panel { 
            width: 95%;
            max-width: 1400px;
            height: 80vh;
            background: var(--white);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(80, 126, 161, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
        }

        .slide-img-container {
            width: 100%;
            height: 60%;
            overflow: hidden;
            background: #eee;
        }

        #s-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease-in-out;
        }

        .slide-content {
            padding: 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .badge {
            display: inline-block;
            padding: 6px 15px;
            background: #e1effa;
            color: #2c5d85;
            border-radius: 8px;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 20px;
        }

        #s-title {
            font-family: 'DM Serif Display', serif;
            font-size: 42px; /* Fonte Grande para TV */
            line-height: 1.1;
            margin-bottom: 20px;
            color: #111;
        }

        .meta-info {
            font-size: 16px;
            font-weight: 600;
            color: #7a9cb5;
            display: flex;
            gap: 20px;
        }

        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: #eef4f8;
        }

        #p-bar {
            height: 100%;
            background: var(--green);
            width: 0%;
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">Consuldente <span>News</span></a>
    <div id="clock" class="clock">00:00:00</div>
</header>

<main>
    <div id="radar-panel" onclick="openLink()">
        <div class="slide-img-container">
            <img id="s-img" src="" alt="Notícia">
        </div>
        <div class="slide-content">
            <span id="s-badge" class="badge">Carregando</span>
            <h2 id="s-title">Buscando as últimas notícias do radar...</h2>
            <div class="meta-info">
                <span>FONTE: <strong id="s-fonte" style="color:var(--green)">---</strong></span>
                <span>HORA: <strong id="s-data">--:--</strong></span>
            </div>
        </div>
        <div class="progress-container">
            <div id="p-bar"></div>
        </div>
    </div>
</main>

<script>
    let newsData = [];
    let currentIndex = 0;
    const SLIDE_TIME = 15000; // 15 segundos

    async function init() {
        try {
            const res = await fetch('./data.json?v=' + Date.now());
            newsData = await res.json();
            if(newsData.length > 0) {
                startRadar();
            }
        } catch (e) {
            console.error("Erro ao carregar dados.");
        }
        updateClock();
        setInterval(updateClock, 1000);
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
    }

    function startRadar() {
        showSlide();
        setInterval(showSlide, SLIDE_TIME);
    }

    function showSlide() {
        const n = newsData[currentIndex];
        const imgElement = document.getElementById('s-img');
        const pBar = document.getElementById('p-bar');

        // Efeito de fade na imagem para garantir a troca visual
        imgElement.style.opacity = 0;
        
        setTimeout(() => {
            imgElement.src = n.img + "?t=" + Date.now(); // Cache busting na imagem
            document.getElementById('s-badge').innerText = n.cat;
            document.getElementById('s-title').innerText = n.titulo;
            document.getElementById('s-fonte').innerText = n.fonte;
            document.getElementById('s-data').innerText = n.data;
            imgElement.style.opacity = 1;
        }, 500);

        // Barra de progresso animada via JS para precisão
        pBar.style.transition = 'none';
        pBar.style.width = '0%';
        setTimeout(() => {
            pBar.style.transition = `width ${SLIDE_TIME}ms linear`;
            pBar.style.width = '100%';
        }, 100);

        currentIndex = (currentIndex + 1) % newsData.length;
    }

    function openLink() {
        let idx = currentIndex === 0 ? newsData.length - 1 : currentIndex - 1;
        window.open(newsData[idx].url, '_blank');
    }

    window.onload = init;
</script>
</body>
</html>
