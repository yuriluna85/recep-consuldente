<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consuldente News | TV Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Sora', sans-serif; background-color: #F0F8FF; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        header { background: #fff; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d1e3f0; }
        .logo { font-size: 26px; font-weight: 700; color: #0d6b36; text-decoration: none; }
        .clock { font-size: 22px; font-weight: 700; color: #507ea1; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #radar-panel { width: 95%; max-width: 1400px; height: 85vh; background: #fff; border-radius: 30px; overflow: hidden; box-shadow: 0 25px 60px rgba(80,126,161,0.2); position: relative; cursor: pointer; display: flex; flex-direction: column; }
        .img-box { width: 100%; height: 60%; background: #eee; }
        #s-img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s; opacity: 0; }
        .slide-content { padding: 40px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .badge { display: inline-block; padding: 6px 15px; background: #e1effa; color: #2c5d85; border-radius: 8px; font-weight: 700; font-size: 14px; margin-bottom: 20px; width: fit-content; text-transform: uppercase; }
        #s-title { font-family: 'DM Serif Display', serif; font-size: 42px; line-height: 1.1; margin-bottom: 20px; }
        .meta { font-size: 18px; font-weight: 600; color: #7a9cb5; }
        .p-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: #eef4f8; }
        #p-bar { height: 100%; background: #0d6b36; width: 0%; }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo">Consuldente <span>News</span></a>
        <div id="clock" class="clock">00:00:00</div>
    </header>
    <main>
        <div id="radar-panel" onclick="openLink()">
            <div class="img-box"><img id="s-img" src=""></div>
            <div class="slide-content">
                <span id="s-badge" class="badge">Sincronizando...</span>
                <h2 id="s-title">Conectando ao Radar Consuldente...</h2>
                <div class="meta">FONTE: <strong id="s-fonte" style="color:#0d6b36">---</strong> | HORA: <strong id="s-data">--:--</strong></div>
            </div>
            <div class="p-container"><div id="p-bar"></div></div>
        </div>
    </main>
    <script>
        let news = []; let idx = 0; const TIME = 15000;
        async function init() {
            try {
                const res = await fetch('./data.json?v=' + Date.now());
                news = await res.json();
                if(news.length) start();
            } catch (e) { document.getElementById('s-title').innerText = "Atualizando radar..."; }
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
        }
        function start() { show(); setInterval(show, TIME); }
        function preload(url) { return new Promise(r => { const i = new Image(); i.src = url; i.onload = () => r(url); i.onerror = () => r("https://picsum.photos/800/400"); }); }
        async function show() {
            const n = news[idx]; const img = document.getElementById('s-img'); const bar = document.getElementById('p-bar');
            bar.style.transition = 'none'; bar.style.width = '0%';
            img.style.opacity = 0;
            const url = await preload(n.img);
            setTimeout(() => {
                img.src = url;
                document.getElementById('s-badge').innerText = n.cat;
                document.getElementById('s-title').innerText = n.titulo;
                document.getElementById('s-fonte').innerText = n.fonte;
                document.getElementById('s-data').innerText = n.data;
                img.style.opacity = 1;
                setTimeout(() => { bar.style.transition = `width ${TIME}ms linear`; bar.style.width = '100%'; }, 100);
            }, 400);
            idx = (idx + 1) % news.length;
        }
        function openLink() { window.open(news[idx === 0 ? news.length-1 : idx-1].url, '_blank'); }
        window.onload = init;
    </script>
</body>
</html>
