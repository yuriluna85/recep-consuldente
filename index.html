<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consuldente News</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark: #0d6b36;
    --green-mid: #1a8f4a;
    --green-light: #2eb25d;
    --green-pale: #e6f7ed;
    --gray-100: #f5f5f3;
    --gray-200: #e8e8e5;
    --gray-500: #7a7a75;
    --gray-700: #3a3a38;
    --gray-900: #111110;
    --white: #ffffff;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.06);
    --radius: 12px;
    --radius-sm: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--gray-100);
    color: var(--gray-900);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    height: 68px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .logo-img {
    height: 44px;
    width: auto;
    object-fit: contain;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 700;
    color: var(--green-dark);
    letter-spacing: -0.3px;
  }

  .logo-text span {
    font-weight: 300;
    color: var(--gray-500);
  }

  .header-tagline {
    font-size: 12px;
    color: var(--gray-500);
    margin-left: 4px;
    padding-left: 16px;
    border-left: 1px solid var(--gray-200);
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: 'Sora', sans-serif;
    font-weight: 500;
    background: var(--green-dark);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-refresh:hover { background: var(--green-mid); }
  .btn-refresh:disabled { opacity: 0.6; cursor: not-allowed; }

  /* FILTER BAR */
  .filter-bar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
  }

  .filter-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 6px;
    align-items: center;
    height: 52px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-inner::-webkit-scrollbar { display: none; }

  .filter-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--gray-500);
    white-space: nowrap;
    margin-right: 8px;
  }

  .chip {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-family: 'Sora', sans-serif;
    font-weight: 500;
    border: 1px solid var(--gray-200);
    background: var(--white);
    color: var(--gray-700);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--green-mid); color: var(--green-dark); }
  .chip.active {
    background: var(--green-dark);
    border-color: var(--green-dark);
    color: white;
  }

  /* MAIN */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  /* DESTAQUE */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gray-500);
    margin-bottom: 16px;
  }

  .hero-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    margin-bottom: 32px;
    cursor: pointer;
    transition: box-shadow 0.2s;
  }
  .hero-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.12); }

  .hero-visual {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-light) 100%);
    min-height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .hero-visual::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .hero-icon {
    font-size: 64px;
    position: relative;
    z-index: 1;
  }

  .hero-content {
    padding: 32px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 14px;
    width: fit-content;
  }

  .badge-destaque { background: #fef3e2; color: #c45c00; }
  .badge-pesquisa { background: #e8f0fe; color: #1a56a0; }
  .badge-tecnologia { background: #f0e8fe; color: #6b21a8; }
  .badge-saude { background: var(--green-pale); color: var(--green-dark); }
  .badge-mercado { background: #fff0f0; color: #a01a1a; }
  .badge-implantes { background: #e8fffe; color: #0f766e; }

  .hero-content h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    font-weight: 400;
    line-height: 1.35;
    color: var(--gray-900);
    margin-bottom: 12px;
  }

  .hero-content p {
    font-size: 14px;
    line-height: 1.7;
    color: var(--gray-500);
    margin-bottom: 16px;
  }

  .hero-date {
    font-size: 12px;
    color: var(--gray-500);
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .news-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 20px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.15s;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-top: 3px solid transparent;
  }
  .news-card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    transform: translateY(-2px);
  }
  .news-card.cat-pesquisa { border-top-color: #4a7fcb; }
  .news-card.cat-tecnologia { border-top-color: #9333ea; }
  .news-card.cat-saude { border-top-color: var(--green-mid); }
  .news-card.cat-mercado { border-top-color: #dc2626; }
  .news-card.cat-implantes { border-top-color: #0d9488; }

  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-date {
    font-size: 11px;
    color: var(--gray-500);
  }

  .news-card h3 {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.45;
    color: var(--gray-900);
    flex: 1;
  }

  .news-card p {
    font-size: 13px;
    line-height: 1.6;
    color: var(--gray-500);
  }

  .card-link {
    font-size: 12px;
    color: var(--green-dark);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: auto;
  }

  /* STATUS */
  #status-box {
    text-align: center;
    padding: 60px 20px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--gray-200);
    border-top-color: var(--green-dark);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-msg {
    font-size: 14px;
    color: var(--gray-500);
  }

  /* FOOTER */
  footer {
    background: var(--gray-900);
    color: var(--gray-500);
    text-align: center;
    padding: 24px;
    font-size: 12px;
  }
  footer strong { color: var(--green-light); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .hero-card { grid-template-columns: 1fr; }
    .hero-visual { min-height: 160px; }
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .header-tagline { display: none; }
    .hero-content h2 { font-size: 20px; }
  }
</style>
</head>

<script>
let allNews = [];
let currentFilter = 'all';

const CATEGORIES = {

  'pesquisa': { label: 'Pesquisa', badge: 'badge-pesquisa', icon: '🔬', cls: 'cat-pesquisa' },

function getCat(raw) {
  const r = (raw || '').toLowerCase().trim();
  for (const k of Object.keys(CATEGORIES)) {
    if (r.includes(k)) return k;
  }
  return 'saude bucal';
}

async function loadNews() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;

  document.getElementById('main-content').innerHTML = `
    <div id="status-box">
      <div class="spinner"></div>
      <p class="status-msg">Buscando as últimas notícias odontológicas...</p>
    </div>
  `;

  const today = new Date().toLocaleDateString('pt-BR');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{
          role: 'user',
          content: `Você é editor do portal Consuldente News. Hoje é ${today}. Pesquise na web as notícias mais recentes e relevantes sobre Odontologia no mundo (de 2025 ou 2026). Retorne SOMENTE um array JSON válido, sem markdown, sem texto extra. Formato exato:
[
  {
    "titulo": "Título da notícia em português (max 90 chars)",
    "resumo": "Resumo em 2 frases curtas em português brasileiro",
    "categoria": "uma de: tecnologia, pesquisa, saude bucal, mercado, implantes",
    "data": "DD/MM/AAAA",
    "destaque": true
  }
]
Retorne entre 7 e 9 notícias variadas, com UMA marcada como destaque=true e as demais destaque=false. Apenas o JSON, absolutamente nada mais.`
        }]
      })
    });

    const data = await res.json();
    const text = (data.content || []).map(i => i.text || '').join('');
    const start = text.indexOf('[');
    const end = text.lastIndexOf(']') + 1;
    if (start === -1) throw new Error('JSON não encontrado');
    allNews = JSON.parse(text.slice(start, end));
    renderNews();
  } catch(e) {
    document.getElementById('main-content').innerHTML = `
      <div id="status-box">
        <p class="status-msg" style="color:#dc2626">⚠️ Não foi possível carregar as notícias. Verifique sua conexão e tente novamente.</p>
        <br><button class="btn-refresh" style="margin:0 auto;display:flex" onclick="loadNews()">Tentar novamente</button>
      </div>
    `;
  } finally {
    btn.disabled = false;
  }
}

function renderNews() {
  const filtered = currentFilter === 'all'
    ? allNews
    : allNews.filter(n => getCat(n.categoria) === currentFilter);

  if (!filtered.length) {
    document.getElementById('main-content').innerHTML = `<div id="status-box"><p class="status-msg">Nenhuma notícia encontrada nesta categoria.</p></div>`;
    return;
  }

  const destaque = filtered.find(n => n.destaque) || filtered[0];
  const resto = filtered.filter(n => n !== destaque);
  const cat = CATEGORIES[getCat(destaque.categoria)] || CATEGORIES['saude bucal'];

  let html = '';

  // Hero card
  html += `
    <p class="section-title">Destaque</p>
    <div class="hero-card" onclick="detail('${encodeURIComponent(destaque.titulo)}')">
      <div class="hero-visual">
        <span class="hero-icon">${cat.icon}</span>
      </div>
      <div class="hero-content">
        <span class="badge ${cat.badge}">${cat.label}</span>
        <h2>${destaque.titulo}</h2>
        <p>${destaque.resumo}</p>
        <span class="hero-date">📅 ${destaque.data}</span>
      </div>
    </div>
  `;

  // Grid
  if (resto.length) {
    html += '<p class="section-title">Últimas notícias</p><div class="grid">';
    for (const n of resto) {
      const c = CATEGORIES[getCat(n.categoria)] || CATEGORIES['saude bucal'];
      html += `
        <div class="news-card ${c.cls}" onclick="detail('${encodeURIComponent(n.titulo)}')">
          <div class="card-meta">
            <span class="badge ${c.badge}">${c.icon} ${c.label}</span>
            <span class="card-date">${n.data}</span>
          </div>
          <h3>${n.titulo}</h3>
          <p>${n.resumo}</p>
          <span class="card-link">Saiba mais →</span>
        </div>
      `;
    }
    html += '</div>';
  }

  document.getElementById('main-content').innerHTML = html;
}

function filter(el, tag) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = tag;
  if (allNews.length) renderNews();
}

function detail(titleEnc) {
  const title = decodeURIComponent(titleEnc);
  if (confirm('Deseja buscar mais detalhes sobre esta notícia?\n\n"' + title + '"')) {
    const q = encodeURIComponent('odontologia ' + title);
    window.open('https://www.google.com/search?q=' + q, '_blank');
  }
}

loadNews();
</script>
</body>
</html>
