name: Atualização Horária de Notícias

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Atende a sugestão do log

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4 # Atualizado de v3 para v4

    - name: Configurar Python
      uses: actions/setup-python@v5 # Atualizado de v4 para v5
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        pip install requests beautifulsoup4

    - name: Executar script de busca
      run: python parser.py

    - name: Commit e Push das novas notícias
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data.json
        # O "|| exit 0" evita que o robô dê erro se não houver notícias novas para salvar
        git commit -m "🔄 Atualização horária: Notícias Odonto" || exit 0
        git push
